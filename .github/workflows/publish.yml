name: Publish NuGet Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NUGET_TRUSTED_USER: ${{ vars.NUGET_USER || secrets.NUGET_USER || github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Supertoys.PocketSphinx.csproj

      - name: Pack
        run: dotnet pack Supertoys.PocketSphinx.csproj -c Release --no-restore

      - name: Validate trusted publishing user
        run: |
          if [ -z "${NUGET_TRUSTED_USER}" ]; then
            echo "NUGET_USER is not set (vars/secrets) and repository_owner is empty."
            exit 1
          fi
          echo "Using trusted publishing user: ${NUGET_TRUSTED_USER}"

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_TRUSTED_USER }}

      - name: Push package
        run: dotnet nuget push bin/Release/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
